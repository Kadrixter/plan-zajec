<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Lekcji</title>

    <!-- Meta tagi Open Graph -->
    <meta property="og:title" content="Plan Lekcji">
    <meta property="og:description" content="Sprawdź swój plan lekcji i nie tylko!">
    <meta property="og:image" content="https://example.com/images/preview-image.jpg">
    <meta property="og:url" content="https://example.com">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">
    <style>
        /* Czarny motyw z obrazem jako tłem */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url('https://i.pinimg.com/originals/08/57/44/08574440a3a43744451b89701ff20858.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
        }

        #container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background-color: rgba(30, 30, 30, 0.9); /* Ciemne, półprzezroczyste tło */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: rgba(30, 30, 30, 0.9); /* Półprzezroczyste tło dla tabeli */
        }

        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #333;
            color: #e0e0e0;
        }

        td {
            color: #e0e0e0;
        }

        .current-lesson {
            background-color: #3e3e3e;
        }

        a {
            color: #90caf9;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .notification-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #333;
            color: #e0e0e0;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .notification-btn:hover {
            background-color: #444;
        }

        .hidden {
            display: none;
        }

        #timer-container {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            background-color: rgba(34, 34, 34, 0.9); /* Półprzezroczyste tło dla timera */
            text-align: center;
        }

        #timer-text {
            font-size: 18px;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Plan Lekcji</h1>
        <div id="timer-container">
            <span id="timer-text">Do końca lekcji:</span>
            <span id="timer"></span>
        </div>
        <div id="plan"></div>
        <div id="after-school-message"></div>
        <div id="after-school-gif"></div>
        <div id="weekend-message"></div>
    </div>

    <!-- Przycisk powiadomień -->
    <button id="notification-btn" class="notification-btn" onclick="requestNotificationPermission()">Włącz powiadomienia</button>

    <script>
        // Pozostały kod JavaScript (bez zmian)
    </script>
</body>
</html>
